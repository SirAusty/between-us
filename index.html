<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Between Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💞 Between Us</h1>

                <!-- Room Setup -->
        <div id="setup-section">
            
            <select id="category-select" class="theme-picker">
                <option value="mixed">🔀 Mixed (A bit of everything)</option>
                <option value="couples">❤️ Couples (Deep & Romantic)</option>
                <option value="funny">😂 Funny & Embarrassing</option>
                <option value="loyalty">🤝 The Loyalty Test</option>
            </select> <!-- THIS TAG IS CRUCIAL! -->

            <button id="create-room-btn">Create Room</button>
            <p class="or-text">or</p>
            <input type="text" id="room-code-input" placeholder="Enter Room Code">
            <button id="join-room-btn">Join</button>
        </div>


        <!-- Game Area (Strictly hidden until joined) -->
        <div id="game-section" class="hidden">
            <h3 id="room-display">Room: <span id="current-room-code"></span></h3>
            
            <div class="card">
                <h2 id="question-text">Waiting for question...</h2>
            </div>

            <div class="answers-container">
                <textarea id="my-answer" placeholder="Type your answer..."></textarea>
                <button id="submit-btn">Send!</button>
            </div>

            <div id="partner-status" class="status-box">
                <p>Partner's Answer:<br><span id="partner-answer-text">Waiting...</span></p>
            </div>
            
            <button id="next-question-btn" class="hidden action-btn">Next Question ➡️</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
