<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Between Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💞 Between Us</h1>
        
        <div id="setup-section">
            <button id="create-room-btn">Create Room</button>
            <p>or</p>
            <input type="text" id="room-code-input" placeholder="Enter Room Code">
            <button id="join-room-btn">Join</button>
        </div>

        <div id="game-section" class="hidden">
            <h3 id="room-display">Room: <span id="current-room-code"></span></h3>
            
            <div class="card">
                <h2 id="question-text">Waiting for question...</h2>
            </div>

            <div class="answers">
                <textarea id="my-answer" placeholder="Type your answer..."></textarea>
                <button id="submit-btn">Submit</button>
            </div>

            <div id="partner-status">
                <p>Partner's Answer: <span id="partner-answer-text">Waiting...</span></p>
            </div>
        </div>
    </div>

                <div id="partner-status">
                <p>Partner's Answer: <span id="partner-answer-text">Waiting...</span></p>
            </div>
            
            <button id="next-question-btn" class="hidden" style="margin-top: 15px; background-color: #2ed573;">Next Question ➡️</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

</body>
</html>
